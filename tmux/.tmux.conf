##### PREFIX ###############################################################

set -g prefix C-a
unbind C-b
bind C-a send-prefix


##### TERMINAL #############################################################

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"


##### SHELL ################################################################

set-option -g default-shell /bin/zsh


##### PERFORMANCE ##########################################################

set -sg escape-time 1
set -g repeat-time 200
set -g history-limit 100000


##### INDEXING #############################################################

set -g base-index 1
setw -g pane-base-index 1


##### MOUSE ################################################################

set -g mouse on


##### VIM COPY MODE ########################################################

setw -g mode-keys vi

unbind [
bind Escape copy-mode

bind -Tcopy-mode-vi v send -X begin-selection
bind -Tcopy-mode-vi y send -X copy-selection-and-cancel


##### ACTIVITY #############################################################

set -g monitor-activity on


##### STATUS BAR ###########################################################

set -g status on
set -g status-interval 5
set -g status-justify centre

set -g status-style bg=colour19,fg=white

set -g status-left-length 40
set -g status-left "#[fg=colour20] #S "

set -g status-right "#[fg=colour20]%Y-%m-%d %H:%M #[fg=colour39]#h"


##### WINDOW STYLE #########################################################

setw -g window-status-style fg=white,bg=default,dim
setw -g window-status-current-style fg=colour233,bg=colour4


##### PANE BORDERS #########################################################

set -g pane-border-style fg=black
set -g pane-active-border-style fg=colour39


##### COMMAND MESSAGES #####################################################

set -g message-style fg=white,bg=black


##### CLEAN SCREEN #########################################################

bind -n C-p send-keys -R \; clear-history \; display "clean!"


##### WINDOW MANAGEMENT ####################################################

bind w new-window
bind c kill-pane
bind k confirm-before -p "Kill window #W?" kill-window
bind q confirm-before -p "Kill session #S?" kill-session


##### SPLITS ###############################################################

bind v split-window -h
bind s split-window -v


##### PANE NAVIGATION (VIM STYLE) #########################################

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


##### WINDOW NAVIGATION ####################################################

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+


##### RESIZE PANES #########################################################

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


##### RELOAD CONFIG ########################################################

bind r source-file ~/.tmux.conf \; display "~/.tmux.conf reloaded!"